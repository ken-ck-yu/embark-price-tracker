name: Price Alert Check

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check price and create alert
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(tail -n 1 embark_price_tracker.csv)

          DATE=$(echo "$LATEST" | cut -d',' -f1)
          TIME=$(echo "$LATEST" | cut -d',' -f2)
          SINGLE_PRICE=$(echo "$LATEST" | cut -d',' -f3 | xargs)
          PACK_PRICE=$(echo "$LATEST" | cut -d',' -f4 | xargs)
          LOWEST_PRICE=$(echo "$LATEST" | cut -d',' -f5 | xargs)
          PRICE_ALERT=$(echo "$LATEST" | cut -d',' -f6 | xargs)

          echo "Price Alert field: $PRICE_ALERT"

          if [ "$PRICE_ALERT" = "true" ]; then
            TODAY=$(date +%Y-%m-%d)
            EXISTING=$(gh issue list --label "price-alert" --state open --search "created:>=$TODAY" --json number --jq 'length' || echo "0")

            if [ "$EXISTING" -eq 0 ]; then
              {
                echo "The Embark DNA test kit price has dropped to USD 119 or below!"
                echo ""
                echo "Date: $DATE"
                echo "Time (London): $TIME"
                echo "Single Kit Price: $SINGLE_PRICE"
                echo "2-Pack Price: $PACK_PRICE"
                echo "Lowest Price of the day: $LOWEST_PRICE"
                echo ""
                echo "Shop: https://shop.embarkvet.com/products/breed-and-health-dog-dna-test-kit"
              } > /tmp/issue_body.md

              gh issue create \
                --title "Price Alert: Embark at USD 119 or below!" \
                --body-file /tmp/issue_body.md \
                --label "price-alert"
            else
              echo "Issue already created today, skipping."
            fi
          else
            echo "Price above USD 119, no alert needed."
          fi
